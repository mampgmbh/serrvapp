name: Feature Request
description: Suggest something you'd like serrv to do
labels: ["feature request"]
body:
  - type: textarea
    id: feature
    attributes:
      label: What would you like serrv to do?
      description: Describe the feature as clearly as possible.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this be useful?
      description: What problem does it solve for you?
    validations:
      required: false
